
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .email-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .otp-box {
            font-size: 28px;
            font-weight: bold;
            color: #2C3E50;
            letter-spacing: 4px;
            margin: 20px 0;
        }

        .footer {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <h2>Hello @Model.Name,</h2>
        <p>To reset your password, please use the OTP code below. It is valid for 10 minutes:</p>

        <div class="otp-box">@Model.OTP</div>

        <p>If you didn’t request a password reset, you can ignore this email.</p>

        <div class="footer">
            &copy; NBR System. All rights reserved.
        </div>
    </div>
</body>
</html>
