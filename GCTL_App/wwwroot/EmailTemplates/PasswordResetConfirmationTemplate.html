
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Confirmation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
            color: #333;
        }

        .email-container {
            background-color: #ffffff;
            padding: 30px;
            max-width: 600px;
            margin: auto;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }

        .heading {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .message {
            font-size: 16px;
            line-height: 1.6;
        }

        .footer {
            font-size: 13px;
            color: #888;
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="heading">Hi @Model.Name,</div>

        <div class="message">
            We just wanted to let you know that your password was successfully reset.
            <br /><br />
            If you didn’t perform this action, please contact our support team immediately.
        </div>

        <div class="footer">
           NBR. All rights reserved.
        </div>
    </div>
</body>
</html>
